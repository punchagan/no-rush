baseURL = "https://punchagan.github.io/no-rush/"
languageCode = "en-us"
title = "No Rush"


# We're using custom layouts, no theme needed

[params]
  description = "I draw whatever shifts the flow of time for me. It can be the bark of a peepal. the shape of clouds on a dry summer day. the frown on my mother's face. the arc of a swing. the leftover coffee in a mug. the stitches on pillows. friendships. possibilities of multiple universes. a kind touch. stardust."
  author = "Your Name"
  email = "hello@yourname.com"
  instagram = "https://instagram.com/yourhandle"
  behance = "https://behance.net/yourhandle"

  # Hero image on homepage (place in static/images/)
  heroImage = "/images/art/many-attempts-at-drawing-a-circle.png"
  heroAlt = "A detailed drawing of a moon-like celestial object"

[params.patr]
name = "This Week's Read"
email_only = true
[menu]
  [[menu.main]]
    name = "Home"
    url = "/#home"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/#about"
    weight = 2
  [[menu.main]]
    name = "Art"
    url = "/#art"
    weight = 3
    identifier = "art"
  [[menu.main]]
    name = "Pages"
    url = "/#art-pages"
    weight = 1
    parent = "art"
  [[menu.main]]
    name = "Commissions"
    url = "/#art-commissions"
    weight = 2
    parent = "art"
  [[menu.main]]
    name = "Connect"
    url = "/#connect"
    weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
