<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title
      }}{{ end }}
    </title>
    <meta
      name="description"
      content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Josefin+Sans:wght@300;400&family=Source+Sans+3:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    {{ $css := resources.Get "styles.css" | resources.Minify |
    resources.Fingerprint }}
    <link
      rel="stylesheet"
      href="{{ $css.RelPermalink }}"
      integrity="{{ $css.Data.Integrity }}"
      crossorigin="anonymous"
    />
  </head>
  <body class="{{ .Section }}{{ if .IsHome }} home{{ end }}">
    <header class="site-header">
      <a href="/" class="site-name">{{ .Site.Title }}</a>

      <button class="menu-toggle" aria-label="Menu" aria-expanded="false">
        <span></span>
        <span></span>
      </button>

      <nav class="site-nav" role="navigation">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#art">Art</a>
        <a href="#connect">Connect</a>
      </nav>
    </header>

    <main class="site-main">{{ block "main" . }}{{ end }}</main>

    <footer class="site-footer">
      <p>&copy; {{ now.Year }} {{ .Site.Params.author }}</p>
    </footer>

    <script>
      // Mobile menu toggle
      const menuToggle = document.querySelector(".menu-toggle");
      const nav = document.querySelector(".site-nav");

      menuToggle.addEventListener("click", () => {
        const expanded = menuToggle.getAttribute("aria-expanded") === "true";
        menuToggle.setAttribute("aria-expanded", !expanded);
        nav.classList.toggle("open");
        document.body.classList.toggle("menu-open");
      });

      // Gentle fade-in on scroll
      const observerOptions = {
        threshold: 0.1,
        rootMargin: "0px 0px -50px 0px",
      };

      const fadeObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
          }
        });
      }, observerOptions);

      document
        .querySelectorAll(".fade-in")
        .forEach((el) => fadeObserver.observe(el));

      // Carousel functionality (desktop only)
      if (window.innerWidth > 768) {
        document
          .querySelectorAll(".carousel-container")
          .forEach((container) => {
            const track = container.querySelector(".carousel-track");
            const items = Array.from(
              container.querySelectorAll(".carousel-item"),
            );
            const prevBtn = container.querySelector(".carousel-prev");
            const nextBtn = container.querySelector(".carousel-next");

            let currentIndex = 0;

            function updateCarousel() {
              // Update active class
              items.forEach((item, index) => {
                item.classList.toggle("active", index === currentIndex);
              });

              // Center the active item
              const containerWidth = container.offsetWidth;
              const itemWidth = items[0].offsetWidth;
              const itemMargin = 32; // 2rem margin on each side = 64px total
              const offset =
                containerWidth / 2 -
                itemWidth / 2 -
                currentIndex * (itemWidth + itemMargin * 2);

              track.style.transform = `translateX(${offset}px)`;

              // Update button states
              prevBtn.disabled = currentIndex === 0;
              nextBtn.disabled = currentIndex === items.length - 1;
            }

            // Click side items to center them
            items.forEach((item, index) => {
              item.addEventListener("click", (e) => {
                if (index !== currentIndex) {
                  e.preventDefault();
                  currentIndex = index;
                  updateCarousel();
                }
              });
            });

            // Arrow navigation
            prevBtn.addEventListener("click", () => {
              currentIndex = Math.max(0, currentIndex - 1);
              updateCarousel();
            });

            nextBtn.addEventListener("click", () => {
              currentIndex = Math.min(items.length - 1, currentIndex + 1);
              updateCarousel();
            });

            // Initialize
            updateCarousel();
          });
      }
    </script>
  </body>
</html>
