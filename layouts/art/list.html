{{ define "main" }}
<header class="page-header">
  <h1>Work</h1>
  <p class="subtitle">Detailed worlds in ink &amp; paper</p>
</header>

<nav class="filter-nav">
  <a href="/work/" class="active">All</a>
  <a href="/work/personal/">Personal</a>
  <a href="/work/commissioned/">Commissioned</a>
  <a href="/work/collaborations/">Collaborations</a>
</nav>

<div class="gallery-grid">
  {{ range .Pages.ByDate.Reverse }}
  <a href="{{ .Permalink }}" class="gallery-item fade-in">
    {{ with .Params.image }}
    <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy">
    {{ else }}
    <div style="width: 100%; height: 100%; background: linear-gradient(135deg, #1a1614, #0a0a0a);"></div>
    {{ end }}
    <div class="gallery-item-overlay">
      <div class="gallery-item-info">
        <h3 class="gallery-item-title">{{ .Title }}</h3>
        {{ with .Params.medium }}
        <span class="gallery-item-medium">{{ . }}</span>
        {{ end }}
      </div>
    </div>
  </a>
  {{ end }}
</div>
{{ end }}
